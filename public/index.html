<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Two Player Snake</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="version-badge">v1.0.5</div>
        <h1>Two Player Snake</h1>
        <p class="tagline">One player is the snake. The other is the apple.</p>
      </header>

      <section id="join-screen" class="panel">
        <h2>Join a game</h2>
        <div class="mode-picker">
          <label class="mode-option">
            <input type="radio" name="mode" value="network" checked />
            <span>Network</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="local" />
            <span>Local</span>
          </label>
        </div>
        <label id="server-address-label">
          Server address
          <input
            id="server-url"
            type="text"
            placeholder="http://localhost:3000"
            autocomplete="off"
          />
        </label>
        <label id="lobby-code-label">
          Lobby code
          <input
            id="lobby-code"
            type="text"
            placeholder="Leave blank to create a lobby"
            autocomplete="off"
            maxlength="4"
          />
          <small>Enter a 4-character code to join an existing game.</small>
        </label>
        <div class="role-picker">
          <label class="role-option">
            <input type="radio" name="role" value="snake" checked />
            <span>Snake</span>
            <small>WASD or arrow keys</small>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="apple" />
            <span>Apple</span>
            <small>Arrow keys</small>
          </label>
        </div>
        <button id="join-btn" type="button">Connect</button>
        <p id="join-error" class="error hidden"></p>
      </section>

      <section id="game-screen" class="hidden">
        <div class="hud">
          <div class="hud-item">
            <span class="label">You are</span>
            <span id="role-badge" class="badge"></span>
          </div>
          <div class="hud-item">
            <span class="label">Score</span>
            <span id="score">0</span>
          </div>
          <div class="hud-item">
            <span class="label">Lobby</span>
            <span id="lobby-display">—</span>
          </div>
          <div class="hud-item lobby-status">
            <span id="snake-status" class="dot offline"></span> Snake
            <span id="apple-status" class="dot offline"></span> Apple
          </div>
          <button id="settings-btn" type="button" class="settings-btn">Settings</button>
        </div>

        <div class="board-wrap">
          <canvas id="board" width="600" height="400" tabindex="0"></canvas>

          <div id="waiting-overlay" class="overlay waiting hidden">
            <p id="waiting-text">Waiting for the other player…</p>
            <button id="open-second-tab" type="button">Open second player tab</button>
          </div>

          <div id="overlay" class="overlay hidden">
            <p id="overlay-text"></p>
            <button id="restart-btn" type="button">Play again</button>
          </div>
        </div>

        <p id="controls-hint" class="hint"></p>
        <p id="cooldown-text" class="hint"></p>
        <p id="status-text" class="hint"></p>
      </section>

      <section id="settings-screen" class="panel hidden">
        <h2>Settings</h2>
        <label class="settings-row">
          <input type="checkbox" id="swap-controls" />
          <span>Swap apple and snake controls</span>
        </label>
        <label>
          Board style
          <select id="board-style">
            <option value="grid">Grid</option>
            <option value="solid">Solid</option>
            <option value="minimal">Minimal</option>
          </select>
        </label>
        <label>
          Board color
          <input id="board-bg-color" type="color" value="#111827" />
        </label>
        <label>
          Snake head color
          <input id="snake-head-color" type="color" value="#4ade80" />
        </label>
        <label>
          Snake body color
          <input id="snake-body-color" type="color" value="#22c55e" />
        </label>
        <label>
          Apple color
          <input id="apple-color" type="color" value="#ef4444" />
        </label>
        <div class="settings-actions">
          <button id="save-settings" type="button">Save</button>
          <button id="close-settings" type="button">Close</button>
        </div>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/client.js"></script>
  </body>
</html>
